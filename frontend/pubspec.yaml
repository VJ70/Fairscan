name: fairscan
description: FairScan — AI Fairness Auditor for Google Solution Challenge 2026
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.2
  firebase_storage: ^11.7.4
  # Google Sign-In
  google_sign_in: ^6.2.1
  # HTTP
  dio: ^5.4.3+1
  # File handling
  file_picker: ^8.0.3
  # Charts
  fl_chart: ^0.67.0
  # PDF
  printing: ^5.13.1
  pdf: ^3.10.8
  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  lottie: ^3.1.2
  # State management
  provider: ^6.1.2
  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/

