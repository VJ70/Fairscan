steps:
  - name: 'python:3.11'
    entrypoint: bash
    args:
      - -c
      - |
        cd backend
        pip install -r requirements.txt --quiet
        pip install pytest --quiet
        pytest tests/ -v
    id: 'run-tests'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/fairscan/api:$SHORT_SHA', './backend']
    id: 'build-image'
    waitFor: ['run-tests']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/fairscan/api:$SHORT_SHA']
    id: 'push-image'
    waitFor: ['build-image']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - fairscan-api
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/fairscan/api:$SHORT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --max-instances=10
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID
    id: 'deploy'
    waitFor: ['push-image']

options:
  logging: CLOUD_LOGGING_ONLY
